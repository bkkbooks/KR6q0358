body:
  text: 丹霞淳禪師語録目次卷上序大洪山上堂法語真贊偈頌卷下增輯上堂法語舉古頌古隨州大洪山淳禪師語録嗣法小師慶預校勘師於政和五年九月二十五日在唐州大乘山慧照菴受隨州大洪請拈疏云還會麼驪珠未剖價難酬灼爍寒光映碧流罔象未能知去處更憑子細説端由讀疏罷師升座示衆云好諸禪德蕭索茅菴草亂埋柴扉日午尚慵開冥然獨坐枯根上孰謂殊恩雲外來遂置金雞報曉重明少室之玄旨石女謳歌再唱新豐之妙曲直得千山擁瑞萬卉呈祥八方道泰時康一國河清海晏諸人還會麼正當霜桂花開夜又是蟠桃結實時入院上堂云危巒蕭灑古禪宮信步重歸趣無窮風卷白雲天界淨一輪紅日正當空當日知事請小參云銀臺燃鳳燭𦦨照虗堂寶閣扣金鐘聲騰空界於是慧光無間冥通先佛之妙心雅梵喧轟潛運祖師之密旨識情未盡舉目皆差根境頓忘殊途一致若能如是始解帶角披毛雖然恁麼大洪拄杖猶未肯在敢問諸人且道拄杖子別有甚麼長處良久云天教生在千峰上穩密盤根勢未休上堂云曉風吹散碧天雲日上長空景象分寂照含虗無內外當明一句若為論所以道一句子當明不當照一句子當照不當明一句子明暗混融一句子不落明暗四句中且道那一句為賓那一句為主若也委悉得去便乃行腳事畢苟或未然萬古碧潭空界月再三撈摝始應知冬夜小參好諸禪德金鐘雖韻星月未分假燈燭為光明仗聲塵為佛事於是熒煌交映音韻相和逈出見聞遐超聲色所以道欲識解脫道諸法不相到眼耳絶見聞聲色閙浩浩諸人若也於斯委悉得去可謂如龍得水似虎依山苟或未然不免他旋轉大洪今夜不惜眉毛為諸人説破耳界聞時眼界通一根旋返六圓融欲知佛祖虗明地妙在聲香味觸中冬節上堂山上今冬少陰雪晴和天氣如春月斯辰又喜一陽生梅根占得先開發欲知佛性義諦觀時節正當林木凋疏天地寒冽且道一陽從什麼處生諸人還會麼要知陽氣潛興處直向金剛際下看其或未然節辰已過伏惟起居萬福臘八上堂屈指欣逢臘月八釋迦成道是斯辰二千年後追先事重把香湯浴淨身諸禪德古有十六開士因僧浴時隨例入室忽悟水因洞明妙觸盡入圓通境界大洪今日普請往靈濟殿上灌沐釋迦如來箇中亦有悟底消息諸人還會麼香湯瀲灔兩三杓便向如來頂上傾除夜小參今夜年窮歲盡來辰改旦迎春光陰倐忽不饒人齒髮衰殘又添歲大衆光陰遷謝念念無常時不待人命焉得久人人盡知今日是臘月三十日還曾準備得今日事麼諸人莫作等間直得切切準備他始得且道作麼生準備莫是聚集財物為準備莫是看閲經教為準備莫是念禪䇿子為準備莫是持機巧心為準備正當恁麼時眼光落地手腳忙亂從前記得一時忘了到這裡直須腳蹈實地始得用掠虗不得也諸人時中快須休歇去準備他去把今時事放盡去向枯木堂中冷坐去切須死一遍去却從死裡建立來一切處謾你不得一切處轉你不得一切處得自在去所以道懸崖撒手自肯承當絶後再蘇相欺不得若能如是可謂旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月麗天而不周其或未然祇知事逐眼前過不覺老從頭上來元旦升座正氣回春東君扇物向無生中生成萬有於無住本建立諸緣情與無情咸承恩力是以夜明簾外君臣慶賀於茲時枯木岩前父子歡呼於此日諸禪德祇如野老門下又復如何良久云還會麼兒孫俱得力室內不知春上堂拈起拂子云大洪拂子拈起則春光妍媚萬木含芳放下則寸草不生普天一色然雖恁麼子細觀來猶是時人窠窟此二途如何履踐良久云還會麼但得春風和暖自然背陰花開師於天寧萬壽禪寺上堂祝香云伏願皇帝陛下二儀同壽生成萬物而無為三光共明照燭十方而不間遂升座示衆云三德齊敷結淨緣十方僧寶世良田願將此日無為福上祝皇圖億萬年於是琉璃殿瑩君臣會合而一氣連枝明月堂深子父相逢而同身共命相將行處玉階寒蘚蒙茸携手歸時碧嶂白雲繚繞通身及盡不當機信步回途無異路所以從無住本立一切法經行坐臥常在其中語默動容不離當處諸人還會麼十方國土無他境四海歡謠奉一人即將此日舉揚般若大會殊因謹用上嚴今上皇帝陛下伏願道齊五帝福邁諸天位居北極之崇壽等南山之固次願知府大夫通判大夫郡縣文武賢僚德祛民瘼風傳去獸之威才入聖眸夢應非熊之兆上堂云好諸禪德夫為如來之子宜各以道為務直須洗滌根塵遂使三業清淨於圓明正念而念念無差方能入道脫離生死苟或未然貪著空華衣失却娘生袴臘月三十日手忙腳亂去奉勸諸禪流得坐自回顧結夏上堂云安居三月以大圓覺為我伽藍實相住持禁足九旬具平等智護生履道饒益有情然雖恁麼更須知有一人不安居守制不履道護生諸人還識得麼苟或未然不免重為宣説佛祖從來不奈伊滿頭明月去還歸雖然六戶無親識今古何曾更間違小參示衆云好諸禪德法本無住隨處圓成道絶言詮應機建立於是衲僧家有時向高高山頂立縱橫不陟古來今有時向深深海底行信步全超無伴侶然雖恁麼子細觀來猶是究理邊事且道透脫一句又作麼生良久云還會麼靜極光通本妙圓嘶風玉馬過重關回途不落威音世妙用全彰化外看上堂拈拄杖云大洪有箇無影杖虎踞龍蟠孰敢向有時橫按坐虗堂臨濟德山還膽喪然雖恁麼且道得力在什麼處諸人還會麼好是月華鋪蘚砌相將間繞玉堂行上堂云三月安居已半過虗明心地又如何有求宛然成機巧無作方能不較多爐裡寒灰香旖旎巖前枯木葉婆娑白頭人在千峰上妙唱新豐一曲歌諸禪德還聞麼靈然古韻曾非間聽者須明未兆前上堂拈起拂子示衆云大洪拂子非有名非無名七佛前前本混成非有相非無相淵而無下高無上若論陰陽未兆時卷舒俱在光明藏諸禪德且作麼生是光明藏還會麼浩然無異色照盡未當今上堂云好諸禪德碧玉界中無變異虗明地上有離微妙圓一句如何説隱顯含融豈間違到這裡且作麼生是不間違處還會麼鐵牛耕破壺天遠繁興大用不當機上堂少林九年垂一語流布諸方多賺舉大洪今日老婆心未免分明細説與良久云還會麼月裡姮娥巧金針穿斷線半夜繡鴛鴦能有幾人見上堂云金佛不度爐妙相圓明會也無泥佛不度水落落圓音美復美木佛不度火蕭蕭古殿無關鎖是須撒手直歸家莫向半途空懡㦬諸禪德且作麼生是歸家底事良久云還會麼獨坐枯根石頭上四溟無浪月輪孤天寧節上堂云天然貴異骨涉功勳妙應昌期當陽不露所以海音堂上擊法鼓而演真機毗盧殿中叩鯨鐘而宣至理於是堯風大扇舜日高明千賀誕聖之辰萬國祝南山之壽且道壽年多少還會麼明月一輪生海面玉人披影數金沙郡山回山上堂云七佛前前曠路賒碧琉璃界鎖蟾華披衣出戶更猶永撒手還家日未斜諸禪德且道到家一句又作麼生良久云還會麼行盡白雲路靜聞流水聲陳謝典座上堂云杓柄笊籬權在手放行把住非窠臼二時齋粥在精專自利利他功不朽且作麼生是不朽之功還會麼須知盤中餐粒粒皆辛苦再留監寺上堂云圓澄覺海遊戲而獨掌難鳴沒底蘭舟鼓棹而大家著力致迷津者得岸滯水者忘憂然雖恁麼更須知有一人出門無轍迹入戶不當堂千聖興來盡是傳語底人諸祖降世焉敢正眼顧著且道是什麼人還相識麼昨夜偶隨流水去今朝又逐白雲歸上堂云湛然無變異虗徹有靈通妙盡功忘處咸歸寂照中乃竪起拂子云這箇是拂子且道那箇是寂那箇是照還會麼鶴鷺並頭蹈雪睡月明驚起兩遲疑上堂云殘冬凜冽寒滴水便成團翻憶少林祖齊腰立雪難或謂將心與汝安覓心不見一毫端廓然記得來時路頓覺壺中景象寬琉璃光裏一般般午夜依依月正圓最先三子得皮肉末後一人得髓還最先三子即不問且道那箇是末後一人還會麼遠觀同半月近看却如鉤若是知音者思惟暗點頭為亡僧下火云大地雪漫漫臨行一句難泥牛沉巨浸玉馬火中寒諸人若向這裏委悉得去可謂來如月分衆水去似雲散千峰苟或未然伏惟尚嚮為亡僧下火云三緣和合成有四大離散還空且道那箇是能上座主人翁還會麼來兮無依去兮何託紅焰亘空不曾燒著為亡僧下火云出家兒無休暇終日忙忙空搆架臨行一著太區區眼見耳聞爭不怕百骸狼藉撒奚為普請般柴用燒化且道中間有燒不化者麼諸禪德白雲靉靆空去來渺邈清虗無縫罅尚嚮真贊丹霞開山天然禪師丹山月冷祖室風清瞻之仰之千載揚名古佛不存檀佛像寒岩曾許鐵牛耕丹霞第二代無學禪師皎月流輝影澄寒水萬有齊彰太虗廓爾禪版曾酬上上機當鋒未薦西來旨丹霞第三代安禪師龍準高不高虎頤短不短半夜崑崙兒兩手扶銀碗丹霞第四代勳禪師寒風凜凜古貌堂堂俱盧日午瞻部夜央聲前一句兮從爾商量淨因和尚即真非真是假非假語路未陳言滿天下驪龍海臥彩雲深黑漆崑崙騎玉馬般陽老人昔年顏似玉今日鬢如霜不挂金襴服還衣白㲲裳彩鳳夜棲無影樹曉天雲綻露斜陽禪人寫師真求贊咄這枯稿形容平生太煞揭斗電光石火之機兩舌一還無口直截根源不肯談愛引禪徒荒草走真非真偽非偽圓眼橫眉醜脣平鼻圖畫自難同思量何處是月籠松頂兮鶴夢初醒雪覆蘆花兮鷺寒不睡寫出病形眉目分明直饒全似祇得八成聞名兮不如見面見面兮不如聞名霜天月滿兮難尋老兔海門潮落兮不覓長鯨偈頌五位正中偏寶殿煙籠月色前井底燃燈天未曉暗中誰辨往來源偏中正嫫母臨妝羞照鏡三更玉戶不挑燈混融非露當年影正中來運步紅爐遍九垓寶月夜光隨處靜披雲終不露纖埃偏中至大用無私何擬議當鋒那肯落今時他家自有超倫志兼中到及盡有無真個妙披毛戴角火中行縱橫不落今時道又正中偏寶月光凝海底天何事漁舟難滿載流輝爭肯透波瀾偏中正水雲深鎖漁家境一派長江極目清日照筠竿那露影正中來一葉輕舟泛遠灘錦鱗不觸香鈎餌何得絲綸更犯羶偏中至收絲却返蘆花裡高欹龜枕恣情眠長江信任波濤起兼中到更闌六宅無音耗縱橫澤國路優遊樵人舉步應難造間居回途玉馬休相伴背角泥牛莫下鞭多謝乾坤垂覆載間雲芳草恣情眠自宗空劫自己無依守佛祖從來難啓口九年面壁太多端那堪更強分妍醜釣者海際煙收欲暮天扁舟輕泛出蘆灣絲綸夜擲清波裡曉得金鱗不犯竿送升上人馳法嗣書飛花暖日輕相送烈焰須憑作者通覿面不勞伸語路丹山千里事同風送法弟應首座落葉紛紛萬卉凋雲衣輕卷下岧嶢他年花蕚動榮日靈樹無根暗長苗送靜上人本自圓成不在言泥牛耕破劫初田夜來風月霜威重天曉崑崙戴雪還酬寂道人言前無句擬何伸妙語玄談眼裡塵一邑毗耶金粟衆想應翻笑住山人無縫塔月皎漁舟瑞氣旋蘆花深處夜濤寒可憐無限垂絲者隨例忙忙失釣竿趙州婆子勘破話木人嶺上歌石女溪邊舞明月共同途無私照今古和淨因老師漁父詞四海無家何拘礙垂絲坐對煙雲靄水急風和舟行快嚴霜屆蓮裳籜笠和煙戴洪鱗每自藏深派今朝釣得真奇怪鼓棹驚波桑田改三災壞恁時方稱生涯在潦倒漁翁一無解蒼蒼雪鬢知何載短棹輕舟泛滄海拋鈎在碧波深處全無閡錦鱗吞餌浮絲擺樵父兩岸皆憐愛直透龍門頭角改誰能怪為霖方顯靈通大送升長老住大乘皎月流輝千嶂冷泥牛徐步出雲煙玄徒若問西來意直指胞胎未具前送蒲君錫赴任湖南提刑携笻揮汗別文星匝地清風聳百城佛祖位中留不住琉璃殿上緑苔生送龐婆剎剎西來意塵塵古佛心眉毛為道侶鼻孔作知音借問牛頭何處去銜花幽鳥杳難尋送汲助教醫博未到毗耶城不識維摩病有客兮良醫妙術通神聖金針針起髑髏吟此曲千年誰與並酬劉書記朝奉二首生涯得力句盡被維摩説空劫一壺天泥牛耕破月應現宰官人不識棲心祖域道情腴不憐金印大如斗自貴衣中無價珠送俊化主回鄉丐簟昔年百丈曾輕卷今日重歸故國求頓使雲堂三伏裡哭天忽爾變清秋酬滿上人勿謂無言為妙面壁何嘗不道翻思金色頭陀却把剎竿推倒漁父子送齊明二化士凜凜嚴風徹骨寒扁舟輕泛碧波瀾金線直玉鈎端錦鱗無限踊躍上琅玕漁父從來性本寬滿船釣得未為歡收絲了望層巒舉頭方覺天際曉星殘謝安撫張學士惠茸氈虗室更深冷不眠翛翛孤坐幾經年昨宵又覺還耽睡元是新鋪白玉氈冬日寄住菴僧落葉積莓苔柴扉半不開幽林雲密覆花鳥恨空來送王汝弼宣教平生活計都消盡錐地殊無付子孫撒手便辭青嶂去翛然却返白雲村送化士春雲不世情滋澤興還普從龍向海飛散作人間雨幽洞無門任卷舒悠悠莫忘青山父漁父詞五首鶴髮漁翁歲莫論桑田幾變爾常存紅蓼岸荻花村水月虗明兩不痕舉目誰親無可攀翛然獨對水雲間山色裏浪花間妙體堂堂不露顏青虗為釣復為鈎斷索籃兒沒底舟隨放蕩任橫流玉浪堆中得自由輕泛蘭舟入海涯拋鈎擲線莫遲疑驪龍子巨鼇兒不犯清波釣得伊釣盡江湖曉色分數聲羌笛韻凌雲波浩渺霧氛氳鼓棹回舟望海垠和無盡居士牧牛頌頭角崢嶸未兆前亂雲深處任安眠不隨芳草遙山去何用芒童更著鞭因禪人發明以頌示之水濶雲深古路賒五湖禪侶共同家夜來喜得真消息無影林中杇木花寄度兄道友寂照含虗未兆身翛然那與物為鄰任經風月霜威重枯木花芳不犯春默曜堂訪預監寺不遇昔年摩竭令今日孰知恩句外潛心體言前密意論松風清宇宙桂月曜乾坤出戶雖無往爭如靜掩門靜上人病以偈貽之火風地水合為身猶若晴空一點塵借問病從何處起祇應誰是病中人退居後以二偈示預環二禪者十年同此振綱維萬種誵訛悉共知今日脫然無一事坐觀明月照琉璃水最為清月最圓月光含水水涵天混融不落威音世到此如何語正偏送環知客歸省親清風明月秋光半環禪別我云南歸當堂子母相逢日妙圓孰敢分離微咦撥轉吾家向上機回頭觸處生光輝送覺上人異類潛行未兆前昂藏頭角聳摩天回途莫守寒岸草耕破威音那畔田謝王宣教見訪柴扉常對白雲開玉鳳銜花去又回不學東林遠沽酒淵明多謝入山來喜吳雲叟公裕垂訪山路春風桃李香延陵長者賁岩房行行廓爾忘途轍步步翛然合道場妙淨宗乘松宿鶴虗明田地月含霜相逢相見有何事共語毗盧頂後光送止維那作丐常思止禪者返本如嬰兒一念萬年去春秋都不知斫倒寒巖無影樹回頭焰裡再抽枝春老別吾入去緣生會有歸山咦淨榻相看坐清風起四維和正知藏適軒適軒新開非華飾為愛清涼消暑濕景象千般何處來塵埃一點應難入蒲團禪版靜沉沉松韻竹風常龔龔香斷爐寒坐夜深苔墀月滿無人立謝蒙城善友惠米客到蒙城有信歸殷勤惠米助晨炊老僧鉢滿慵相喚長者恩深祇自知粒粒圓成難著會明明嚼碎更何疑趙州遺語誠非謬一飽元來忘百飢任善友求頌差別道難通應須識自宗無根枯樹子月夜影重重丹霞誧法弟新建暖堂以頌慶之暖堂新構侵雲表桂月松風常滿抱玉燭光中靜應時言前妙唱般陽道山居五首林麓結茅廬翛然稱所居松風驚破夢澗氷靜涵虗春老花猶媚秋殘葉未踈良宵無限意東嶺月生初祇這一間田古今無變遷泥牛耕不盡寶月鎮長圓巖桂和煙翠溪花含露鮮甘藏青嶂裡懶更謁時賢家近亂山根日高懶啓門樵歌雲外唱胡曲句前論路僻無人到庭荒有蘚痕蕭蕭巖石畔祇麼老煙村兀坐鎮長行孰人知此情竹風輕有韻巖溜細無聲岌岌三山秀依依片月明門前枯樹子孤鶴夢難成不戀白雲關家山撒手還玉爐香旖旎石澗水潺湲庭樹煙籠合窗軒雨灑斑經行及坐臥常在寂寥間寄隨守向大夫三首歲寒本欲老林垌茲沐恩光入翠層再整絲綸垂釣手隨緣溳水且騰騰道同曾未隔毫端相別相逢會者難偶此又蒙清照及松風桂月襲人寒無絃琴上有希聲此遇知音作證明不犯指端彈一曲碧琉璃界月三更送吳公裕天氣暄妍三月春青山垂訪白頭人威儀雍肅披儒雅語論清泠洗渴塵道合圓常無異路心空及第自通津相逢相別休懷念千里同風德乃鄰蠲上人求頌一九逢春信梅花破雪開箇中如會得千里不空來和張居士默訥虗明履趣深蟾蜍推月照天心松風未作寒林靜一弄無絃琴上音和張伯威見寄今日重來坐暖霞故人笑謂老年華劫空別有壺春在雲對青山興莫涯和章陽叔見寄二首休將水乳試鵝王妙識醇醨別有方本地不消春氣力靈枝劫外有餘芳師曠離婁不我徒昭然罔象得玄珠心萠口擬成途轍底事圓明異有無酬劉于叔妙句靈然溢目寒幽微旨趣會還難相逢更問無絃曲風入松梢不在彈洞山之道六傳而至大陽殆將斷絶投子續之三傳而至丹霞淳禪師師出真歇宏智二子以張皇其門風由是觀之師實吾門之中興也然而師語要世失其所傳後裔靡不以是為恨矣屬者偶得十三葉法孫大容清公所謄寫之師住大洪語録一卷恰如旱天逢甘雨欣躍之餘募刊以廣其傳因裁一偈敬題其後云掀翻洞水盛宗風廣大波瀾灑日東六百經霜猶未沒重刊棗梓永流通寶永七年季春上浣遠孫小比丘良機盥手百拜書
