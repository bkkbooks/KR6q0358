body:
  text: 上堂云乾坤之內宇宙之間中有一寶秘在形山肇法師恁麼道祇解指蹤話跡且不能拈示於人丹霞今日擘開宇宙打破形山為諸人拈出具眼者辨取以拄杖卓一下曰還見麼鷺鷥立雪非同色明月蘆花不似他上堂舉德山示眾曰我宗無語句實無一法與人德山恁麼說話可謂是祇知入草求人不覺通身泥水子細觀來祇具一隻眼若是丹霞則不然我宗有語句金刀剪不開深深玄妙旨玉女夜懷胎上堂亭亭日午猶虧半寂寂三更尚未圓六戶不曾知暖意往來常在三更前上堂寶月流輝澄潭布影水無蘸月之意月無分照之心水月兩忘方可稱斷所以道昇天底事直須颺却十成底事直須去却擲地金聲不須回顧若能如是始解向異類中行諸人到這裏還相委悉麼良久曰常行不舉人間步披毛戴角混泥塵真歇參次師問如何是空劫已前自己歇擬對師曰你閙在且去一日登鉢盂峯豁然契悟徑歸侍立師掌曰將謂你知有歇忻然拜之翌日上堂日照孤峯翠月臨溪水寒祖師玄妙訣莫向寸心安便下座歇直前曰今日陞座更謾某甲不得也師曰你試舉我今日陞座底看歇良久師曰將謂你瞥地歇便出宏智參次師問如何是空劫已前自己智曰井底蝦蟇吞却月三更不借夜明簾師曰未在更道智擬議師打一拂子云又道不借智於言下大悟僧問牛頭未見四祖時如何師曰金菊乍開蜂競採曰見後如何師曰苗枯華謝了無依舉古舉北院問青峰洛浦道入荒田不揀信手拈來草何不道作麼生是信手拈來草峰作拈勢師別曰是則是只是未能喫草舉甘贄行者接待有僧曰行者接待不易贄云譬如餵驢餵馬明安曰也知行者常行此路師別曰來年與行者買一領直裰頌古僧問九峯虔云承聞和尚有言諸聖間出祇是傳語人是否師曰是曰世尊一手指天一手指地云天上天下唯吾獨尊和尚為甚麼却喚作傳語人師曰祇為一手指天一手指地所以喚作傳語人妙相圓明不可親奴兒婢子自殷勤指天指地稱尊大也是傳言送語人僧問洞山詮清淨行者不入涅槃破戒比丘不入地獄時如何師云度盡無遺影還他越涅槃相好巍巍大丈夫一生無智恰如愚從來佛祖猶難望地獄天堂豈可拘青原思禪師初參六祖問當何所務即不落階級祖曰汝曾作什麼來師曰聖諦亦不為祖曰落何階級師曰聖諦尚不為何階級之有祖深器之卓爾難將正眼窺迥超今古類難齊苔封古殿無人侍月鎻蒼梧鳳不棲青原因石頭問和尚出嶺多少時師曰我卻不知汝早晚離曹溪曰希遷不從曹溪來師曰我亦知汝去處也曰和尚幸是大人莫造次木人來問青霄路石女年尊似不聞擕手相將歸故國暮山岌岌鎖重雲藥山惟儼禪師一日在石上坐次石頭問曰汝在這裏作麼師曰一切不為曰恁麼即閒坐也師曰若閒坐即為也曰汝道不為且不為箇什麼師曰千聖亦不識頭以偈讚曰從來共住不知名任運相將祗麼行自古上賢猶不識造次凡流豈可明玄微及盡本翛然若謂渠閒萬八千月印澄江魚不見釣人何必更拋筌道吾因石霜問百年後有人問極則事向他道甚麼師喚沙彌彌應諾師曰添淨瓶水著師良久却問霜適來問甚麼霜擬再舉師便歸方丈霜於此有省垂手還他作者機尋常語裏布鎗旗重詢擬進歸方丈一句分明更不疑道吾到五峯峯問還識藥山老宿麼師曰不識曰為甚麼不識師曰不識不識白雲深處路難通擬問踪由已涉功掛角羚羊無影迹從容還落正偏中雲巖同道吾自南泉回藥山師問藥山曰如何是異類中行山曰吾今日困倦且待別時來師曰某甲特為此事歸山來山曰且去師便出吾在方丈外聞師不薦不覺齩得指頭血出下來問師師兄去問和尚那因緣作麼生師曰不為某甲說吾便低頭饑飡嫩草遙山去渴飲寒泉曲㵎回放蕩不耕空劫地暮天何用牧歌催雲巖因僧問二十年在百丈侍巾缾為甚麼心燈不續師曰頭上寶華冠曰頭上寶華冠意旨如何師曰大唐天子及冥王後僧舉問九峯虔禪師大唐天子及冥王意旨如何虔曰却憶洞上之言玉鞭高舉擊金門引出珊瑚價莫論逈古輪王全意氣不彰寶印自然尊高沙彌住菴一日雨中來相看藥山山曰你來也師曰是山曰可煞濕師曰不打這鼓笛雲巖曰皮也無打甚麼鼓道吾曰鼓也無打甚麼皮師曰今日大好一場曲調偶爾垂言借問伊知音爭使落今時胡笳不犯宮商曲玉笛橫時劫外吹百巖明哲禪師洞山與密師伯到參師問曰闍棃近離什麼處洞山曰近離湖南師曰觀察使姓什麼曰不得姓師曰名什麼曰不得名師曰還治事也無曰自有廊幕在師曰豈不出入山便拂袖去師明日入僧堂曰昨日對二闍黎一轉語不稔今請二闍黎道若道得老僧便開粥相伴過夏速道速道山曰太尊貴生師乃開粥共過一夏燒香人靜杳無聲苔滿丹墀皓月明入戶當堂慵正坐出門尤懶下堦行船子誠禪師囑夾山云直須藏身處沒蹤跡沒蹤跡處莫藏身吾三十年在藥山祇明斯事白雲檻外思悠哉密密金刀剪不開幽洞不拘金鎖意縱橫無繫去還來青峯楚因僧問大事已成為甚麼也如喪考妣師曰不得春風花不開及至花開又吹落家山歸到莫因循竭力寅昏奉二親機盡功忘恩義斷便成不孝闡提人樹省禪師問洞山甚麼處來山曰親近來師曰若是親近用動這兩片皮作甚麼後曹山聞舉乃云一子親得從來父子不相離石女何勞更問伊昨夜寒岩無影木白雲深處露橫枝洞山因僧問和尚教學人行鳥道未審如何行鳥道師曰不逢一人曰如何行師曰直須足下無私去曰祇如行鳥道莫便是本來面目否師曰闍黎因甚顛倒曰甚麼處是學人顛倒師曰若不顛倒因甚麼卻認奴作郎曰如何是本來面目師曰不行鳥道古路翛然倚太虗行玄猶是涉崎嶇不登鳥道雖為妙點撿將來已觸途洞山問僧世間何物最苦曰地獄最苦師曰不然在此衣線下不明大事是名最苦鑊湯爐炭幾何般地獄三途未苦酸須信新豐親切語袈裟之下莫顢頇神山與洞山過獨木橋洞先過了拈起木橋曰過來師喚价闍黎洞乃放下木橋平地無端鑿陷坑木橋拈起使人行沉沉寒水如何渡月夜金雞報五更漸源興禪師一日持鍬到石霜於法堂上從東過西從西過東霜曰作麼師曰覓先師靈骨霜曰洪波浩渺白浪滔天覓甚先師靈骨師曰正好著力霜曰這裡針劄不入著甚麼力師持鍬肩上便出本地靈明無一物幾人認得黃金骨扶鍬肩上便行時大辯從來還若訥夾山因僧問撥塵見佛時如何師曰直須揮劒若不揮劒漁父栖巢僧後問石霜撥塵見佛時如何霜曰渠無國土甚處逢渠僧回舉似師師曰門庭施設不如老僧入理深談猶較石霜百步當機一句玉珊珊內外玲瓏溢目寒無漏國中曾不住月華影裡見應難夾山因僧問如何是夾山境師曰猿抱子歸青嶂後鳥啣花落碧巖前蚌含明月珠生腹龍擁深雲雨洒空莫向平田翻巨浪直須點點盡朝東夾山因僧問會處却不問不會處請師一言師曰戶挂凋林影中辨取威音那畔不能行撒手還家懶問程寢殿無人空寂寂滿窻唯有月虗明洞山价禪師解夏上堂曰秋初夏末兄弟或東或西直須向萬里無寸草處去良久曰祇如萬里無寸草處作麼生去顧視左右曰欲知此事直須如枯木上花開方與他合石霜曰出門便是草明安曰直得不出門亦是草漫漫地歸家豈坐碧雲牀出戶不行青草地南北東西本自由渠無向背那廻避僧問洛浦安禪師眾手淘金誰是得者浦云拳中舊寶豈假披沙僧云恁麼則展手不逢也浦云莫將鶴唳擬當鶯啼淘金豈假披沙得不觸波瀾猶費力露柱三更忽放光此時未審何人識僧問洛浦如何是祖師西來意浦云青嵐覆處出岫藏峯白月輝時碧潭無影群花未發梅先拆萬木凋零栢轉奇雲淡不彰篩月影煙輕那露引風枝僧問洛浦一毫吞盡巨海於中更復何言浦云家有白澤之圖必無如是妖怪巖前雖有雲千頃戶內殊無半夜燈極目危巒今古秀暮天斜照碧層層蛤溪道者相看洛浦問曰自從棃溪相別今得幾年溪曰和尚猶記得昔時事浦曰見說道者總忘却年月也溪曰和尚住持事繁且容子細浦曰道者住山事繁這般消息不尋常蟾桂枝枝布遠香昨夜姮娥呈巧妙眼睛直上綉鴛鴦洛浦因僧問供養百千諸佛不如供養一無心道人百千諸佛有何過無心道人有何德師曰一片白雲橫谷口幾多歸鳥盡迷巢拾得踈慵非覺曉寒山懶惰不知歸聲前一句圓音美物外三山片月輝僧問洛浦如何是佛法大意師曰雪覆孤峯峯不白雨滴石笋笋須生海底龍吟雲雨潤林中虎嘯谷風清莫言滿路生荊棘況是家貧少送迎洛浦因僧問學人擬歸鄉時如何師曰家破人亡子歸何處曰恁麼則不歸去也師曰庭前殘雪日輪消室內游塵遣誰掃太平鄉國路空賒歸興悠悠思莫涯撒手到家何所有琉璃寶殿鎖蟾華洛浦因僧問祖意教意是同是別師曰日月並輪輝誰家別有路曰恁麼則顯晦殊途事非一槩師曰但自不亡羊何須泣岐路月篩松影高低樹日照池心上下天赫赫炎空非卓午團團秋夜不知圓韶山因僧問如何是和尚家風師曰絕頂無根草無風葉自搖妙峯孤頂偏肥膩天產靈苗不觸地翠葉無風常自搖清香那逐春光媚韶山因僧到參禮拜起立師曰大才藏拙戶僧過一邊立師曰喪却棟梁材叉手須知已隔津更重進步轉漂淪頑銅若作黃金貨祇可瞞他無眼人黃山輪禪師來參夾山山問曰甚麼處來師曰閩中來山曰還識老僧麼師曰和尚還識學人麼山曰不然子且還老僧草鞋錢然後老僧還汝廬陵米價師曰恁麼則不識和尚未審廬陵米作麼生價山曰真師子兒善能哮吼父子相逢眼倍明靈苗叢裏坦然行箇中若為金毛子已是鹽梅觸大羮上藍超禪師因僧問如何是上藍本分事師曰不從千聖借豈向萬機求曰不借不求時如何師曰不可拈放闍棃手裡得麼一片靈明本妙圓箇中非正亦非偏寶峯瑞草無根蔕不待春功色自鮮僧問四禪禪師古人有請不背今請和尚入井還去也無師云深深無別源飲者消諸渴曹溪源派古之今意識徒將渡淺深好是昔人游戲處雖然入井不曾沉無著喜禪師往五臺華嚴寺至金剛窟禮謁遇老翁牽牛行邀師入寺翁曰近自何來師曰南方曰南方佛法如何住持師曰末法比丘少奉戒律曰多少眾師曰或三百或五百師却問此間佛法如何住持曰龍蛇混雜凡聖同居師曰多少眾曰前三三後三三前後三三不失宗逈迢千聖數難窮金剛腦後全軒露疊疊青山鎖翠空大光誨禪師因僧問祇如達磨是祖否師曰不是祖曰既不是祖又來作甚麼師曰祇為汝不薦曰薦後如何師曰方知不是祖少林續焰事堪可臘夜梅開雪後枝黃蘗昔年曾有語大唐國裏沒禪師九峯在石霜作侍者石霜遷化後眾欲請首座接續住持師白眾問首座曰先師道休去歇去冷啾啾去一條白練去古廟香爐去一念萬年去且道明什麼邊事座曰明一色邊事師曰與麼則不會先師意在座曰但裝香來乃焚香曰我不會先師意香烟起處脫去不得者言訖便坐脫師拊其背曰坐脫立亡即不無先師意未夢見在帶角披毛異類身寒灰枯木眼中塵雖然未會先師意爭奈臨行一著親海湖禪師有座主問和尚甚麼年行道師曰座主近前來主近前師曰祇如憍陳如是甚麼年行道主茫然師喝曰這尿床鬼多是從人學得來一生空把口胡開欲窮此片虗明地七佛前前總不該天蓋幽禪師有一院名無垢淨光造浴室有人問既是無垢淨光為甚麼却造浴室僧無語後請師代師曰三秋明月夜不是騁團圓雖然答盡深深意爭奈投機句未親欲會本來無垢的更須入水見長人九峯因僧問祖祖相傳復傳何事師曰釋迦慳迦葉富曰如何是釋迦慳師曰無物與人曰如何是迦葉富師曰國內孟甞君曰畢竟傳底事作麼生師曰百歲老人分夜燈寂光影裏現全身貴異天然逈出倫家富兒奴偏得力夜分燈火照西隣石柱禪師遊方時到洞山時䖍和尚垂語曰有四種人一人說過佛祖一步行不得一人行過佛祖一句說不得一人說得行得一人說不得行不得阿那箇是其人師出眾曰一人說過佛祖行不得者祇是無舌不許行一人行過佛祖一句說不得者祇是無足不許說一人說得行得者祇是函蓋相稱一人說不得行不得者如斷命求活此是石女兒擔枷帶鎖洞山曰闍黎分上作麼生師曰該通分上卓卓寧彰山曰祇如海上明公秀又作麼生師曰幻人相逢拊掌呵呵海底泥牛耕白月雲中木馬驟清風胡僧懶捧西乾鉢半夜乘舟過海東湧泉欣禪師因唐武宗廢教在院看牛時有強德二禪客到於路次見師騎牛不識乃云蹄角甚分明爭奈騎者不識師驟牛而去二禪客相次憩於樹下煎茶師回下牛近前問訊與坐喫茶師乃問二禪客近離甚處云那邊師曰那邊事作麼生禪客提起茶盞師曰此猶是這邊那邊事作麼生二人無對師曰莫道騎牛者不識好芳草漫漫豈變秋牧童白牯恣優游異中有路人難見却謂騎牛不識牛夾山上堂云明不越戶穴不栖巢目不顧他位裏脚不蹈他位裏六戶不掩四衢無蹤學不停午意不立玄千劫眼不借舌頭底萬劫舌頭不顧眼中明峻機不假鋒鋩事到這裡有甚麼事闍黎竿頭絲線從君弄不犯清波意自殊月沉碧海龍非隱霧鎖蒼梧鳳不知劫外森森無影木垂陰自有未萌枝湧泉欣因僧問如何是相傳底事師曰龍吐長生水魚吞無盡漚曰請師挑硩師曰擂鼓轉船頭棹穿波底月依依半月沉寒水耿耿三星落碧巑昔日雲巖曾漏泄金輪王子寶花冠僧問文殊禪師僧繇為甚麼邈志公真不得師曰非但僧繇志公亦邈不得曰志公為甚麼邈不得師曰彩繪不將來曰和尚還邈得也無曰我亦邈不得曰和尚為甚麼邈不得師曰渠不苟我顏色教我如何邈身光熾盛相巍巍妙手如何彩繪伊休問僧繇吳道士志公佗日不能知曹山寂禪師因僧問世間甚麼物最貴師曰死猫兒最貴曰為甚麼死猫兒却貴師曰無人著價腥臊紅爛不堪親觸動輕輕血污身何事杳無人著價為伊非是世間珍曹山辭洞山山問曰向甚麼處去師曰不變異處去山曰不變異處豈有去邪師曰去亦不變異家家門掩蟾蜍月處處鶯啼楊柳風若謂縱橫無變異猶如擲劒擬虗空曹山因僧問五位對賓時如何師曰汝即今問那箇位曰某甲從偏位中來請師向正位中接師曰不接曰為甚麼不接師曰恐落偏位中去師却問僧祇如不接是對賓是不對賓曰早是對賓了也師曰如是如是月中玉兔夜懷胎日裏金烏朝抱卵黑漆崑崙踏雪行轉身打破琉璃椀龍牙遁禪師因僧問二鼠侵藤時如何師曰須有隱身處始得曰如何是隱身處師曰還見儂家麼寒月依依上遠峯平湖萬頃練光封漁歌驚起沙洲鷺飛入蘆花不見踪疎山仁禪師因主事僧為師造壽塔畢白師師曰將多少錢與匠人曰一切在和尚師曰為將三文錢與匠人為將兩文錢與匠人為將一文錢與匠人若道得與吾親造塔來僧無語後僧舉似大嶺菴閑和尚嶺曰還有人道得麼曰未有人道得嶺曰汝歸與疎山道若將三錢與匠人和尚此生決定不得塔若將兩錢與匠人和尚與匠人共出一隻手若將一錢與匠人累他匠人眉鬚墮落僧回如教而說師具威儀望大嶺作禮嘆曰將謂無人大嶺有古佛放光射到此間雖然如是也是臘月蓮花大嶺後聞此語曰我恁麼道早是龜毛長三尺清風吹動釣魚船鼓起澄波浪拍天堪笑錦鱗爭戲水到頭俱被釣絲牽疎山冬至夜有僧上堂問如何是冬來意師曰京中出大黃京師出大黃熟處最難忘道吾常作舞元是謝三郎疎山因靈泉問枯木生花始與他合是這邊句是那邊句師曰亦是這邊句曰如何是那邊句師曰石牛吐出三春霧靈不栖無影林滄海無風波浪平烟收水色虗含月寒光一帶望何窮誰辨箇中龍退骨雲居膺禪師上堂曰得者不輕微明者不賤用識者不咨嗟解者無厭惡從天降下則貧寒從地湧出則富貴門裡出身易身裡出門難動則埋身千丈不動則當處生苗一言逈脫獨拔當時言語不要多多則無用處門頭戶尾事千差了盡猶來未到家明月堂前無影木嚴凝雪夜正開花青林䖍禪師因僧問學人徑往時如何師曰死蛇當大路勸子莫當頭曰當頭者如何師曰喪子命根曰不當頭時如何師曰亦無迴避處曰正當恁麼時如何師曰失却也曰未審向甚麼處去師曰草深無覔處曰和尚也須隄防始得師撫掌曰一等是箇毒氣長江澄澈即蟾華滿目清光未是家借問漁舟何處去夜深依舊宿蘆花乾峯和尚上堂曰舉一不得舉二放過一著落在第二雲門出眾曰昨日有人從天台來却往徑山去師曰典座來日不得普請便下座聲前一句口如眉佛祖從來總不知昨夜崑崙閑說夢白頭生得黑頭兒白水仁禪師上堂曰老僧尋常不欲向聲前句後鼓弄人家男女何故聲且不是聲色且不是色時有僧問如何是聲不是聲師曰喚作色得麼曰如何是色不是色師曰喚作聲得麼僧作禮師曰且道為汝說答汝話若向這裡會得許你有箇入路色自色兮聲自聲新鶯啼處柳烟輕門門有路通京國三島斜橫海月明白馬儒禪師因僧問如何是法身向上事師曰井底蝦䗫吞却月九重深密視聽難玉殿瓊樓宿霧攢爕理盡歸臣相事輪王不戴寶花冠天童啟禪師因僧問如何是應用無虧底眼師曰恰如瞎一般盲聾瘖瘂逈天真眼似眉毛道始鄰昨夜東君潛布令黃鶯啼處綠楊春玄沙備禪師一日遣僧送書上雪峰和尚峯開緘唯白紙三幅問僧會麼曰不會峯曰不見道君子千里同風僧回舉似於師師曰遮老和尚蹉過也不知三番白紙問寒暄千里同風月滿船奪得高標全用處盤蛇口內打鞦韆北院靜禪師因僧問牛頭未見四祖時如何師曰異境靈松覩者皆羨曰見後如何師曰葉落已枝摧風來不得韻寶杖親携挂翠纓徘徊常遶玉堦行轉身就父無標的拈却花冠不得名曹山霞禪師因僧侍立師曰可煞熱曰是師曰祇如熱向甚麼處迴避曰鑊湯爐炭裡迴避師曰鑊湯爐炭裏又作麼生迴避曰眾苦不能到崑岡片玉火中潤碧落孤蟾水底圓一念翛然無異色任從滄海變桑田木平道禪師問洛浦一漚未發時如何辨其水脉浦曰移舟諳水勢舉棹別波瀾師不契乃參蟠龍亦如前問龍曰移舟不別水舉棹即迷源師從此悟入金烏玉兔兩交馳照破威音未兆時若謂青霄別有路木人依舊皴雙眉谷山緣禪師僧問如何是祖師西來意師曰夜半烏兒頭戴雪天明啞子抱頭歸瑞靄祥烟鎖玉樓妙年王子恣優游琉璃殿上騎金馬明月堂前輥綉毬白雲藏禪師僧問如何是深深處師曰矮子渡深溪白頭童子智尤長半夜三更渡渺茫任運往來無間斷不消船艇與浮囊同安察禪師僧問如何是天人師師曰頭上角不全身上毛不出秘殿重圍曉尚寒丹墀苔潤未排班寶香鳳燭煙雲合寂寂簾垂不露顏新羅泊巖禪師僧問如何是禪師曰古塚不為家曰如何是道師曰徒勞車馬迹曰如何是教師曰貝葉收不盡故國清平久有年白頭猶自戀生緣牧童却解忘功業懶放牛兒不把鞭古塚不為家曹溪古路綠苔生車馬登臨已涉程野老痿羸兼跛挈手携玉杖夜深行徒勞車馬迹四十九年成露布五千餘軸盡言詮妙明一句威音外折角泥牛雪裏眠貝葉收不盡新羅大嶺禪師僧問如何是一切處清淨師曰截瓊枝寸寸是寶析栴檀片片皆香乾坤盡是黃金國萬有全彰淨妙身玉女背風無巧拙靈苗花秀不知春泐潭明禪師僧問碓搗磨磨不得忘却時如何師曰虎口裡活兒一念蕭蕭不記年皮膚脫落自完全長天夜夜清如鏡萬里無雲孤月圓同安丕禪師僧問如何是和尚家風師曰金鷄抱子歸霄漢玉兔懷胎入紫微曰忽遇客來如何祗待師曰金果朝來𤠔摘去玉花晚後鳳啣歸日午烟凝山突兀夜央天淡月嬋娟混然寂照寒宵永明暗圓融未兆前同安丕因僧問依經解義三世佛冤離經一字即同魔說此理如何師曰孤峯逈秀不挂烟蘿片月行空白雲自異雲自高飛水自流海天空闊泳孤舟夜深不向蘆灣宿逈出中間與兩頭雲居簡禪師僧問孤峯獨宿時如何師曰閑著七間僧堂不宿阿誰教你孤峯獨宿法爾非修本十成平常酬答最分明端然指出長安道無奈遊人不肯行新羅雲住禪師因僧問如何是諸佛師師曰文殊聳耳無相光中未兆身清虗渺邈豈為隣一輪明月當軒照玉殿蕭蕭不見人荷玉慧禪師僧問如何是西來的的意師曰不禮拜更待何時虗堂寂寂夜深寒携得瑤琴月下彈不是知音徒側耳悲風流水豈相干阿育通禪師僧問如何是和尚家風師曰渾身不直五分錢曰恁麼則太貧寒生師曰祖代如此曰如何施設師曰隨家豐儉祖代家風沒一文清貧中更是清貧著衣喫飯隨豐儉物物頭頭用最親護國澄禪師因僧問如何是本來心師曰犀因翫月紋生角象被雷驚花入牙三脚靈龜荒徑走一枝瑞草亂峯埀崑岡含玉山先潤凉兔懷胎月未知護國澄因僧問如何是本來父母師曰頭不白者曰將何奉獻師曰殷勤無米飯堂前不問親出門徧界無知己入戶盈眸不見親虗室夜寒何所有碧天明月頗為鄰金峯志禪師僧問四海晏清時如何師曰猶是堦下漢四海烟塵已晏然當軒明月照人寒大功不賜將軍賞寶馬金槍頓懶觀蜀州西禪禪師僧問如何是非思量處師曰誰見虗空夜點頭一點靈明六不收照然何用更凝眸箇中消息人難委獨有虗空暗點頭廣德延禪師僧問如何是透法身句師曰無力登山水茅戶絕知音體妙探玄盡涉程爭如野老異中行功忘日用平懷穩免事君王寵辱驚石門蘊禪師僧問如何是和尚家風師曰物外獨騎千里象萬年松下擊金鐘夜明簾外月朧騎象飜身擊寶鐘洪韻上騰三界外聾夫何事睡猶濃淨眾禪師僧問蓮華未出水時如何師曰菡萏滿池流曰出水後如何師曰葉落不知秋白藕未萌非隱的紅花出水不當陽遊人莫用傳消息自有清風透遠香同安志禪師僧問二機不到處如何舉唱師曰偏處不逢玄中不失這邊那畔總難逢一句無私不處中紅日暮沉西嶂外空留孤影照溪東廣德義禪師僧問古人云言語道斷非去來今此理如何師曰彌勒涅槃知幾劫護明猶未降迦維妙湛圓明第一機降生成道涅槃時迦維摩竭雙林樹認著元來不是伊廣德義因僧問久負不逢時如何師曰扇開人不遇陋巷莫能收妙體堂堂相好全青霄獨步躡金蓮千華臺上猶慵坐弊垢襴衫豈肯穿石門徹禪師僧問雲光作牛意旨如何師曰陋巷不騎金色馬回途却著破襴衫瑞艸藂中懶欲眠徐行處處逈翛然披毛戴角人難識為報芒童不用鞭廣德周禪師僧問波浪之中如何得妙師曰橈棹不施兼底脫往來終不借浮囊一句相酬難取則輪王不化閻浮國無邊剎海浪痕平獨駕泥牛耕月色太原隱禪師僧問數家檀越請未審赴誰家師曰月印千江水門門盡有僧妙圓無相劫前人隨類權分百億身月夜御樓纔報曉平明六國盡逢春梁山觀禪師僧問如何是空劫已前事師曰擊動乾坤鼓時人聽不聞虗空為鼓須彌槌擊者雖多聽者稀半夜髑髏驚破夢滿頭明月不思歸梁山因僧問祖意教意是同是別師曰金烏東上人皆貴玉兔西沉佛祖迷靈山會上言雖普少室峯前句未形瑞草蒙茸含月秀寒松蓊出雲青梁山因僧問如何是日用事師曰碧玉點破瑠璃色滿目紅塵不見沙劫火洞然無相宅金門不覩玉樓家寶天雲淡銀河冷浩浩波瀾豈動沙大陽玄禪師上堂曰嵯峨萬仞鳥道難通劒刃輕氷誰當履踐宗乘妙句語路難陳不二法門淨名杜口所以達磨西來九年面壁始遇知音大陽今日也太無端珍重不挂唇皮一句奇少林冷坐最慈悲須知此道非傳授立雪神光已強為大陽僧問如何是和尚家風師曰滿缾傾不出大地沒飢人荊山美玉何須辨赤水玄珠不用拈罔象無心黃帝重卞和有智楚王嫌投子青禪師僧問師唱誰家曲宗風嗣阿誰師曰威音前一箭射透兩重山曰如何是相付底事師曰全因淮地月得照郢陽春曰恁麼則入水見長人師曰祇知荊玉異那辨楚王心師隨後以拂子敲禪牀一下瑚枝上玉花開風清香遍九垓勿謂乾坤成委曲韶陽親見睦州來投子示眾云若論此事如鸞鳳沖霄不留其跡羚羊挂角那覔其蹤金龍不守於寒潭玉兔豈棲於蟾影其或賓主若立須威音路外搖頭問答言陳乃玄路傍提為唱若能如是猶在半途更乃凝眸不勞相見水澄月滿道人愁妙盡無依類莫收劫外正偏兼帶路不萌枝上辨春秋投子因僧問和尚適來拈香祝壽且道當今皇帝壽年多少師曰月籠丹桂遠星拱北辰高六國清平賀聖年珠簾高卷月明前金輪那肯當堂坐不用丹墀擊靜鞭東京天寧芙蓉楷禪師僧問師唱誰家曲宗風嗣阿誰師曰金鳳夜棲無影樹峰巒纔露海雲遮等閑應問豈安排一句全提隱顯該薄霧依依籠古徑孤峰終不露崔嵬芙蓉楷僧問夜半正明天曉不露如何是不露底事師曰滿船空載月漁父宿蘆花星流水國夜然燈月印江天明似鏡隱顯無私位不該依稀擬動成偏正芙蓉楷上堂法身者理妙言玄頓超終始之患諸仁者莫是幻身外別有法身麼莫即幻身便是法身麼若也恁麼會去盡是依他作解蒙昧兩岐法眼未得通明不見僧問夾山如何是法身山云法身無相如何是法眼山云法眼無瑕所以道吾云未有師在忽有人問老僧如何是法身羊便乾處臥如何是法眼驢便濕處尿更有人問作麼生是法身買帽相頭作麼生是法眼坑坎堆阜若點撿將來夾山祇是學處不玄如流俗閨閤裏物不能捨得致使情關固閉識𤨏難開老僧今日若不當陽顯示後學何以知歸勸汝諸人不用求真唯須息諸見若盡昏霧不生自然智鑑洞明更無他物諸人還會麼良久云珠中有火君須信休向天邊問太陽道合平常絕異端行人何必歷艱難從今莫信孫臏卜龜殻無靈不用鑽保壽恩禪師上堂拈拄杖云得自天台絕比倫從來無葉又無根有時扶過斷橋水幾度伴歸明月村雖然如是也不得無過擊香臺一下便下座此樹不從天地生登山涉水承渠力如今擲向亂峯前免致叢林為軌則保壽上堂三界唯心萬法唯識檻外雲生簷頭雨滴㵎水湛如藍野花開似織此時若不究根源謾向當來問彌勒還會麼不勞久立靈然不涉古來今三界都盧一點心檻外桃花春蝶舞門前楊柳曉鶯吟
