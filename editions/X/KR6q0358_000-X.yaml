body:
  text: 丹霞淳禪師語錄序我宗無語句亦無一法與人然於無法之中而立五位三玄之法於無語之中而作呵佛罵祖之說雷砰電射魔外不能窺海湧雲屯龍宮不得藏然未嘗始涉唇吻立文字矣能具此機宏唱五位君臣之法橫說豎說如轉圓石於千仞之上不留其蹤者丹霞淳禪師是也茲師遠裔良機恐其語錄歲久湮沒依舊本參考訂正一新繡梓以永流播因問序於余不以不文辭而謹書之以冠卷首庶幾後學之輩別須具眼子細看取切勿向語言文字求解會焉旹寶永庚寅孟陬下澣萬山祖緣拜手敬題
